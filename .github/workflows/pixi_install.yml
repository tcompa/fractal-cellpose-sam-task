name: pixi install

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  pixi_install:
    name: "pixi install"
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false
          cache: false
          pixi-version: "latest"

      - run: |
          echo "[tool.pixi.pypi-options]" >> pyproject.toml
          echo "no-build = true" >> pyproject.toml

      - run: pixi install -a -v